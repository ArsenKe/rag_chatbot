<!DOCTYPE html>
<html>
<head>
    <title>Royal E-Cars - Data Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #1a73e8; color: white; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; margin: 10px 0; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section { margin: 20px 0; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #1a73e8; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #1557b0; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .stat-card { background: #f0f0f0; padding: 20px; border-radius: 5px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: bold; color: #1a73e8; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Royal E-Cars - Data Manager</h1>
            <p>Upload documents, scrape websites, and manage your knowledge base</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="docCount">0</div>
                <div>Total Documents</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uploadCount">0</div>
                <div>Uploads Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="qualityScore">0%</div>
                <div>Data Quality</div>
            </div>
        </div>

        <div class="card">
            <h2>📁 Upload Document</h2>
            <input type="file" id="fileInput" accept=".txt,.pdf,.docx">
            <button onclick="uploadFile()">Upload</button>
            <div id="uploadStatus"></div>
        </div>

        <div class="card">
            <h2>🌐 Scrape Website</h2>
            <textarea id="urlsInput" placeholder="Enter URLs (one per line)..." rows="5"></textarea>
            <button onclick="scrapeUrls()">Scrape & Index</button>
            <div id="scrapeStatus"></div>
        </div>

        <div class="card">
            <h2>☁️ Import from Google Drive</h2>
            <input type="text" id="folderId" placeholder="Google Drive Folder ID">
            <button onclick="importGDrive()">Import</button>
            <div id="gdriveStatus"></div>
        </div>

        <div class="card">
            <h2>📈 Recent Activity</h2>
            <div id="activity"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        function updateStats() {
            fetch(`${API_URL}/data/stats`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('docCount').textContent = data.total_documents;
                });
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert('Select a file');

            const formData = new FormData();
            formData.append('file', file);

            const res = await fetch(`${API_URL}/data/upload-file`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            
            const status = document.getElementById('uploadStatus');
            if (data.status === 'success') {
                status.innerHTML = `<p class="success">✅ ${data.message}</p>`;
                updateStats();
            } else {
                status.innerHTML = `<p class="error">❌ ${data.message}</p>`;
            }
        }

        async function scrapeUrls() {
            const urls = document.getElementById('urlsInput').value.split('\n').filter(u => u.trim());
            if (!urls.length) return alert('Enter URLs');

            const formData = new FormData();
            urls.forEach(url => formData.append('urls', url));

            const res = await fetch(`${API_URL}/data/scrape-urls`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            
            const status = document.getElementById('scrapeStatus');
            if (data.status === 'success') {
                status.innerHTML = `<p class="success">✅ ${data.message}</p>`;
                updateStats();
            } else {
                status.innerHTML = `<p class="error">❌ ${data.message}</p>`;
            }
        }

        async function importGDrive() {
            const folderId = document.getElementById('folderId').value;
            if (!folderId) return alert('Enter folder ID');

            const formData = new FormData();
            formData.append('folder_id', folderId);

            const res = await fetch(`${API_URL}/data/scrape-gdrive`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            
            const status = document.getElementById('gdriveStatus');
            if (data.status === 'success') {
                status.innerHTML = `<p class="success">✅ ${data.message}</p>`;
                updateStats();
            } else {
                status.innerHTML = `<p class="error">❌ ${data.message}</p>`;
            }
        }

        // Update stats on load
        updateStats();
    </script>
</body>
</html>
